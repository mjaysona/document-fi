name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      MONGODB_ATLAS_PROJECT_ID: ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
      MONGODB_ATLAS_PUBLIC_API_KEY: ${{ secrets.MONGODB_ATLAS_PUBLIC_API_KEY }}
      MONGODB_ATLAS_PRIVATE_API_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_API_KEY }}
      MONGODB_ATLAS_CLIENT_ID: ${{ secrets.MONGODB_ATLAS_CLIENT_ID }}
      MONGODB_ATLAS_CLIENT_SECRET: ${{ secrets.MONGODB_ATLAS_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify droplet SSH connectivity
        shell: bash
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT }}
        run: |
          set -e
          echo "Checking SSH reachability: ${DROPLET_HOST}:${DROPLET_PORT}"

          for attempt in 1 2 3 4 5; do
            if nc -z -w 5 "$DROPLET_HOST" "$DROPLET_PORT"; then
              echo "SSH port is reachable"
              exit 0
            fi

            echo "Attempt ${attempt}/5 failed, retrying in 8s..."
            sleep 8
          done

          echo "SSH endpoint is not reachable from GitHub runner"
          exit 1

      - name: Setup MongoDB Atlas CLI
        uses: mongodb/atlas-github-action@v0.2.2

      - name: Verify Atlas authentication
        shell: bash
        run: |
          atlas config set silence_storage_warning true
          atlas auth whoami

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write build env file
        run: |
          cat > .env.local << 'EOF'
          ${{ secrets.BUILD_ENV_FILE }}
          EOF

      - name: Get runner public IP
        id: get_gh_runner_ip
        shell: bash
        run: |
          echo "ip_address=$(curl -s https://checkip.amazonaws.com)" >> "$GITHUB_OUTPUT"

      - name: Add runner IP to MongoDB Atlas access list
        shell: bash
        run: |
          atlas accessLists create "${{ steps.get_gh_runner_ip.outputs.ip_address }}" --type ipAddress --projectId "$MONGODB_ATLAS_PROJECT_ID" --comment "Temporary access for GitHub Actions"

      - name: Migrate
        run: pnpm payload migrate

      - name: Remove runner IP from MongoDB Atlas access list
        if: always()
        shell: bash
        run: |
          if [ -n "${{ steps.get_gh_runner_ip.outputs.ip_address }}" ]; then
            atlas accessLists delete "${{ steps.get_gh_runner_ip.outputs.ip_address }}" --projectId "$MONGODB_ATLAS_PROJECT_ID" --force
          fi

      - name: Build
        run: pnpm build

      - name: Copy build artifacts to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          port: ${{ secrets.DROPLET_PORT }}
          timeout: 120s
          command_timeout: 20m
          source: ".next,public,package.json,pnpm-lock.yaml,next.config.mjs,payload.config.ts"
          target: "/var/www/document-fi"

      - name: Install prod deps and restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          port: ${{ secrets.DROPLET_PORT }}
          timeout: 120s
          command_timeout: 20m
          script: |
            set -e
            export PNPM_HOME="$HOME/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"

            if ! command -v pnpm >/dev/null 2>&1; then
              npm install -g pnpm@10
            else
              pnpm -v | grep -q '^10\.' || npm install -g pnpm@10
            fi

            cd /var/www/document-fi
            CI=true pnpm install --prod --frozen-lockfile --prefer-offline

            pm2 restart document-fi || pm2 start pnpm --name document-fi -- start
            pm2 save
