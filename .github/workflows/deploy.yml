name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write build env file
        run: |
          cat > .env.local << 'EOF'
          ${{ secrets.BUILD_ENV_FILE }}
          EOF

      - name: Build
        run: pnpm build

      - name: Copy build artifacts to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          port: ${{ secrets.DROPLET_PORT }}
          source: ".next,public,package.json,pnpm-lock.yaml,next.config.mjs,payload.config.ts"
          target: "/var/www/document-fi"

      - name: Install prod deps, migrate, restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          port: ${{ secrets.DROPLET_PORT }}
          script: |
            set -e
            export PNPM_HOME="$HOME/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"

            if ! command -v pnpm >/dev/null 2>&1; then
              npm install -g pnpm@9
            else
              pnpm -v | grep -q '^9\.' || npm install -g pnpm@9
            fi

            cd /var/www/document-fi
            pnpm install --prod --frozen-lockfile --ignore-scripts=false
            pnpm rebuild sharp
            pnpm payload migrate
            pm2 restart document-fi || pm2 start pnpm --name document-fi -- start
            pm2 save